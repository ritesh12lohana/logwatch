server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # proxy log API to backend
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # SSE needs buffering disabled or stream breaks
    location /api/stream {
        proxy_pass http://backend:3000/api/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # expose queue stats to the dashboard
    location /queue/ {
        proxy_pass http://queue:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
