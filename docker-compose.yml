version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: logwatch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: logwatch-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      QUEUE_URL: http://queue:3001
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  queue:
    build: ./queue
    container_name: logwatch-queue
    restart: unless-stopped
    command: node api.js
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build: ./queue
    container_name: logwatch-worker
    restart: unless-stopped
    command: node worker.js
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SIMULATE_FAILURES: "false"
    depends_on:
      redis:
        condition: service_healthy
      queue:
        condition: service_healthy

  producer:
    build: ./producer
    container_name: logwatch-producer
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:3000
      INTERVAL_MS: 2000
    depends_on:
      backend:
        condition: service_healthy

  dashboard:
    image: nginx:alpine
    container_name: logwatch-dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./dashboard/public:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
